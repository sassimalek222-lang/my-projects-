<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedRDV – Administration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
         :root {
            --midnight: #0a0f1e;
            --navy: #0d1b3e;
            --teal: #0ea5a0;
            --white: #ffffff;
            --muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --error: #f87171;
            --gold: #f59e0b;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--midnight);
            color: var(--white);
            min-height: 100vh;
        }
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 70% 70% at 50% 0%, rgba(14, 165, 160, 0.1) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }
        /* NAV */
        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }
        
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--white);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .logo span {
            color: var(--teal);
        }
        /* PAGE WRAPPER */
        
        .page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 1rem 2rem;
            position: relative;
            z-index: 1;
        }
        /* FORM BOX */
        
        .auth-wrap {
            width: 100%;
            max-width: 420px;
        }
        
        .admin-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: var(--gold);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .auth-box {
            background: rgba(13, 27, 62, 0.75);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }
        
        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1.5rem;
        }
        
        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.4rem;
        }
        
        .auth-sub {
            color: var(--muted);
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .warning-box {
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-radius: 10px;
            padding: 0.875rem 1rem;
            font-size: 0.8rem;
            color: var(--gold);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        .form-group label {
            display: block;
            font-size: 0.825rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        
        .form-group input:focus {
            border-color: var(--gold);
        }
        
        .btn-auth {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0a0f1e;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            margin-top: 0.5rem;
        }
        
        .btn-auth:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn-auth:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        #msgBox {
            margin-top: 1rem;
            padding: 0.875rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            display: none;
        }
        
        #msgBox.error {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--error);
            display: block;
        }
        
        #msgBox.success {
            background: rgba(14, 165, 160, 0.1);
            border: 1px solid rgba(14, 165, 160, 0.3);
            color: var(--teal);
            display: block;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.825rem;
            color: var(--muted);
        }
        
        .back-link a {
            color: var(--teal);
            text-decoration: none;
        }
        
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>

    <nav>
        <a href="index.html" class="logo">🏥 Med<span>RDV</span></a>
    </nav>

    <div class="page">
        <div class="auth-wrap">
            <div class="admin-badge">🔐 Accès Administrateur</div>
            <div class="auth-box">
                <div class="auth-logo">⚙️</div>
                <div class="auth-title">Panel Admin</div>
                <div class="auth-sub">Authentification sécurisée requise</div>

                <div class="warning-box">
                    ⚠️ Zone réservée au personnel autorisé uniquement. Toute tentative d'accès non autorisé est enregistrée.
                </div>

                <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                    <div class="form-group">
                        <label>Email administrateur</label>
                        <input type="email" id="email" placeholder="admin@medrdv.tn" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Mot de passe</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-auth" id="loginBtn">Accéder au panel →</button>
                </form>

                <div id="msgBox"></div>
                <div class="back-link"><a href="index.html">← Retour à l'accueil</a></div>
            </div>
        </div>
    </div>

    <script>
        async function handleAdminLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('msgBox');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Connexion...';
            msg.className = '';
            msg.style.display = 'none';

            try {
                const res = await fetch('backend/api-auth.php?action=login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password
                    })
                });
                const data = await res.json();

                if (data.success && data.role === 'admin') {
                    msg.className = 'success';
                    msg.textContent = '✅ Accès autorisé. Redirection...';
                    setTimeout(() => {
                        window.location.href = 'dashboard-admin.html';
                    }, 800);
                } else if (data.success && data.role !== 'admin') {
                    msg.className = 'error';
                    msg.textContent = '🚫 Accès refusé. Ce compte n\'a pas les droits administrateur.';
                    btn.disabled = false;
                    btn.textContent = 'Accéder au panel →';
                } else {
                    msg.className = 'error';
                    msg.textContent = data.error || 'Email ou mot de passe incorrect.';
                    btn.disabled = false;
                    btn.textContent = 'Accéder au panel →';
                }
            } catch (err) {
                msg.className = 'error';
                msg.textContent = '❌ Erreur de connexion au serveur.';
                btn.disabled = false;
                btn.textContent = 'Accéder au panel →';
            }
        }
    </script>
</body>

</html>
